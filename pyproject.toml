[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
    ".git",
    ".github",
    ".vscode",
    "__pycache__",
]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "N"]
ignore = ["E712"]

[tool.ruff.lint.per-file-ignores]
"plugins/*/test/*.py" = ["E402"]
"plugins/*/tests/*.py" = ["E402"]
